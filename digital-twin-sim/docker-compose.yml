services:
  mqtt-broker:
    image: eclipse-mosquitto:2
    container_name: digital-twin-mqtt
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    restart: unless-stopped

  physical-ac:
    build:
      context: ./physical_device
    depends_on:
      - mqtt-broker
    environment:
      MQTT_HOST: mqtt-broker
      MQTT_PORT: 1883
      PUBLISH_INTERVAL_SECONDS: 2
    restart: unless-stopped

  ac-digital-twin:
    build:
      context: ./digital_twin
    depends_on:
      - mqtt-broker
    environment:
      MQTT_HOST: mqtt-broker
      MQTT_PORT: 1883
      ENERGY_PRICE_PER_KWH: 0.18
    restart: unless-stopped
